name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm test
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: parley-vsix
          path: '*.vsix'
          if-no-files-found: error

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Launches a real VS Code instance (needs a virtual display on Linux).
      - run: xvfb-run -a npm run test:integration
