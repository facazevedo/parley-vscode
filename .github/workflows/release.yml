name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Set these as repo secrets to enable marketplace publishing; left unset they no-op.
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm test
      - run: npm run package
      - name: Create GitHub Release with the .vsix attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" ./*.vsix --title "${{ github.ref_name }}" --generate-notes
      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx --yes @vscode/vsce publish -p "$VSCE_PAT" --packagePath ./*.vsix
      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx --yes ovsx publish ./*.vsix -p "$OVSX_PAT"
